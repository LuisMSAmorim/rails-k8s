apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: luismsamorim/rails-k8s:latest
          command: ["bundle", "exec", "rails", "server", "-b", "0.0.0.0"]
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 10
            failureThreshold: 3
            initialDelaySeconds: 20
          env:
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: api-configmap
                  key: db_host
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: api-configmap
                  key: db_port
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: api-configmap
                  key: db_name
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: db_username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: db_password
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: secret_key_base
