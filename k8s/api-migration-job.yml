apiVersion: batch/v1
kind: Job
metadata:
  name: api-migration
spec:
  template:
    spec:
      containers:
        - name: api-migration
          image: luismsamorim/rails-k8s:latest
          command: ["bundle", "exec", "rails", "db:migrate"]
          env:
            - name: RAILS_ENV
              value: "production"
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: secret_key_base
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: api-configmap
                  key: db_host
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: api-configmap
                  key: db_port
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: api-configmap
                  key: db_name
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: db_username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: db_password
      restartPolicy: Never
  backoffLimit: 4
